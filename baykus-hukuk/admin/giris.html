<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin Girişi — Baykuş Hukuk</title>
<link rel="stylesheet" href="../css/admin.css">
</head>
<body>

<div class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <span class="login-logo-icon">🦉</span>
      <h1>Baykuş Hukuk</h1>
      <p>Admin Paneli — Yetkili Giriş</p>
    </div>

    <div class="login-error" id="login-error"></div>
    <div class="lockout-notice" id="lockout-notice"></div>

    <div class="login-form">
      <div class="form-group">
        <label class="form-label">Şifre</label>
        <input class="form-input" type="password" id="admin-pass" placeholder="Admin şifrenizi girin" autocomplete="current-password" onkeydown="if(event.key==='Enter') doLogin()">
      </div>
      <button class="login-btn" onclick="doLogin()" id="login-btn">Giriş Yap →</button>
    </div>

    <div class="login-security-note">
      🔒 Bu alan yalnızca yetkili yöneticiye açıktır
    </div>
  </div>
</div>

<!-- ► İlk kurulumda şifre değişikliği için modal -->
<div id="setup-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:10px;padding:2rem;max-width:400px;width:100%;margin:1rem;box-shadow:0 20px 50px rgba(0,0,0,.3)">
    <h2 style="font-family:'Playfair Display',serif;color:var(--navy);margin-bottom:.5rem">İlk Kurulum</h2>
    <p style="color:var(--muted);font-size:.87rem;margin-bottom:1.4rem;line-height:1.6">Şu an varsayılan şifre ile giriş yaptınız. Güvenlik için lütfen yeni bir şifre belirleyin.</p>
    <div class="form-group">
      <label class="form-label">Yeni Şifre</label>
      <input class="form-input" type="password" id="new-pass" placeholder="En az 8 karakter">
    </div>
    <div class="form-group">
      <label class="form-label">Şifre Tekrar</label>
      <input class="form-input" type="password" id="new-pass2" placeholder="Şifreyi tekrar girin">
    </div>
    <div id="setup-error" style="color:var(--red);font-size:.82rem;margin-bottom:.8rem;display:none"></div>
    <button onclick="saveNewPassword()" style="width:100%;background:var(--navy);color:#fff;border:none;padding:.85rem;border-radius:6px;font-family:'Source Sans 3',sans-serif;font-weight:600;cursor:pointer;font-size:.95rem">Şifremi Belirle</button>
  </div>
</div>

<script src="../js/data.js"></script>
<script>
// Zaten giriş yapılmışsa yönlendir
if (Auth.isLoggedIn()) {
  window.location.href = 'panel.html';
}

function doLogin() {
  const pass = document.getElementById('admin-pass').value;
  const errorEl = document.getElementById('login-error');
  const lockoutEl = document.getElementById('lockout-notice');
  const btn = document.getElementById('login-btn');

  errorEl.className = 'login-error';
  lockoutEl.style.display = 'none';

  if (!pass) {
    errorEl.textContent = 'Lütfen şifrenizi girin.';
    errorEl.className = 'login-error show';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Kontrol ediliyor...';

  // Kısa gecikme (brute force yavaşlatma)
  setTimeout(() => {
    const result = Auth.login(pass);

    if (result.success) {
      const isDefault = btoa(pass) === btoa('Baykus2025!');
      const hasChangedPass = Store.get('pass_changed', false);

      if (isDefault && !hasChangedPass) {
        // İlk kurulum — şifre değiştirme modalı
        document.getElementById('setup-modal').style.display = 'flex';
        btn.disabled = false;
        btn.textContent = 'Giriş Yap →';
      } else {
        btn.textContent = 'Yönlendiriliyor...';
        window.location.href = 'panel.html';
      }
    } else if (result.locked) {
      lockoutEl.textContent = `⛔ Çok fazla hatalı deneme. ${result.remaining} dakika bekleyin.`;
      lockoutEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Giriş Yap →';
    } else {
      errorEl.textContent = `❌ Hatalı şifre. ${result.remaining} deneme hakkınız kaldı.`;
      errorEl.className = 'login-error show';
      document.getElementById('admin-pass').value = '';
      document.getElementById('admin-pass').focus();
      btn.disabled = false;
      btn.textContent = 'Giriş Yap →';
    }
  }, 600);
}

function saveNewPassword() {
  const p1 = document.getElementById('new-pass').value;
  const p2 = document.getElementById('new-pass2').value;
  const errEl = document.getElementById('setup-error');

  if (p1.length < 8) {
    errEl.textContent = 'Şifre en az 8 karakter olmalıdır.';
    errEl.style.display = 'block';
    return;
  }
  if (p1 !== p2) {
    errEl.textContent = 'Şifreler eşleşmiyor.';
    errEl.style.display = 'block';
    return;
  }

  // Yeni şifreyi kaydet
  Store.set('admin_pass_hash', btoa(p1));
  Store.set('pass_changed', true);
  Store.set('admin_session', { valid: true, loginTime: Date.now() });

  document.getElementById('setup-modal').style.display = 'none';
  window.location.href = 'panel.html';
}
</script>
</body>
</html>
